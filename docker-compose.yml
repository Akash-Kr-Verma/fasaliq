version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cheeta
      POSTGRES_DB: fasaliq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:cheeta@db:5432/fasaliq
      - SECRET_KEY=fasaliq-super-secret-key-change-this-later
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - DASHBOARD_USERNAME=admin
      - DASHBOARD_PASSWORD=admin123
    depends_on:
      - db
    volumes:
      - ./backend:/app # Useful for local development with hot reloading
      
volumes:
  postgres_data:
